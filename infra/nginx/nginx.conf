upstream php_fcgi {
  server wordpress:9000;
}

server {
  listen 80;
  listen [::]:80;
  server_name blog.hushdev.xyz;

  # SSL is terminated by Traefik; this container only handles plain HTTP internally.

  client_max_body_size 1024M;
  gzip on;

  root /var/www/html;
  index index.php index.html;

  # Serve robots.txt correctly
  location = /robots.txt {
    default_type text/plain;
    try_files /robots.txt =404;
    access_log off;
    log_not_found off;
    allow all;
  }

  # Handle Yoast-generated dynamic sitemaps (force XML content-type)
  location ~* /(sitemap\.xml|sitemap_index\.xml|[a-z\-]+-sitemap[0-9]*\.xml)$ {
    try_files $uri $uri/ /index.php?$args;
    add_header Content-Type application/xml always;
}

  # Main site handler
  location / {
    try_files $uri $uri/ /index.php?$args;
  }

  # PHP handler
  location ~ \.php$ {
    include fastcgi_params;
    fastcgi_pass php_fcgi;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
  }

  # API CORS support
  location /api/ {
    if ($request_method = OPTIONS) {
      add_header "Access-Control-Allow-Origin" *;
      add_header "Access-Control-Allow-Methods" "GET, POST, OPTIONS, HEAD";
      add_header "Access-Control-Allow-Headers" "Authorization, Origin, X-Requested-With, Content-Type, Accept";
      return 200;
    }
  }
}
